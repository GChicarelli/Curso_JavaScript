<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aula 13 - Busca Por CEP</title>
    <link rel="stylesheet" href="styles/styles.css">
</head>
<body>
    <main>
        <h1>Busca Por CEP</h1>
        <label for="cep">CEP:</label>
        <input type="text" id="cep" aria-placeholder="Digite o CEP">
        <button id="botao-buscar">Buscar</button>
    
        <form class="formulario">
            <label for="rua">Rua:</label>
            <input type="text" id="rua" placeholder="Digite o nome da rua">
    
            <label for="bairro">Bairro</label>
            <input type="text" id="bairro" placeholder="Digite o bairro">
    
            <label for="cidade">Cidade</label>
            <input type="text" id="cidade" placeholder="Digite a Cidade">
    
            <label for="estado">Estado</label>
            <input type="text" id="estado" placeholder="Digite o Estado">
    
        </form>
    </main>

    <script src="scripts/script.js"></script>
</body>
</html>
